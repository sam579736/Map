<!-- preview.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>足迹地图预览 - XiaoTen FootprintMap</title>
  <style>
    body { margin:0; padding:0; font-family: system-ui, sans-serif; }
    header { background: linear-gradient(135deg,#6366f1,#8b5cf6); color:white; padding:15px 20px; display:flex; justify-content:space-between; align-items:center; }
    .map-container { height: calc(100vh - 60px); position:relative; }
    #previewMap { width:100%; height:100%; }
  </style>
</head>
<body>
  <header>
    <h1>足迹地图预览</h1>
    <a href="index.html" style="color:white;">← 返回构建器</a>
  </header>

  <div class="map-container">
    <div id="previewMap" class="footprint-map" style="width:100%;height:100%;" data-amap-key="01c4ee7aa40ab2e55c191e6eee56f3d6"></div>
  </div>

  <script src="https://webapi.amap.com/maps?v=2.0&key=01c4ee7aa40ab2e55c191e6eee56f3d6"></script>
  <script src="static/js/footprintmap.js"></script>

  <script>
    function loadData() {
      const params = new URLSearchParams(location.search);
      const base64 = params.get('data');
      
      if (!base64) {
        document.getElementById('previewMap').innerHTML = '<div style="padding:40px;text-align:center;color:#666;">没有收到数据</div>';
        return;
      }

      try {
        const jsonText = decodeURIComponent(escape(atob(base64)));
        const blob = new Blob([jsonText], { type: 'application/json' });
        const url = URL.createObjectURL(blob);

        const mapEl = document.getElementById('previewMap');
        mapEl.setAttribute('data-json', url);

        if (window.FootprintMap?.bootstrapMap) {
          window.FootprintMap.bootstrapMap(mapEl);
        }
      } catch (e) {
        console.error(e);
        alert('数据解析失败');
      }
    }

    window.onload = loadData;
  </script>
</body>
</html>
