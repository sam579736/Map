<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>我的足迹地图</title>
  <link rel="stylesheet" href="static/css/footprintmap.css" />
  <style>
    body, html { margin:0; padding:0; height:100%; overflow:hidden; background:#f8fafc; }
    header {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .map-container { height: calc(100vh - 62px); position: relative; }
    #mainMap { width: 100%; height: 100%; }
    .empty {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #64748b;
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1 style="margin:0; font-size:23px;">我的足迹地图</h1>
      <p style="margin:0; opacity:0.9; font-size:14px;">XiaoTen FootprintMap</p>
    </div>
    <button id="loadBtn" style="padding:8px 18px; border-radius:6px; background:rgba(255,255,255,0.25); border:none; color:white; cursor:pointer;">
      📤 加载 JSON
    </button>
  </header>

  <div class="map-container">
    <div id="mainMap" class="footprint-map" data-amap-key="01c4ee7aa40ab2e55c191e6eee56f3d6"></div>
    
    <div id="emptyTip" class="empty">
      <h3>暂无数据</h3>
      <p>请从 <a href="editor.html" style="color:#6366f1;">构建器</a> 点击「新页面预览」</p>
    </div>
  </div>

  <input type="file" id="fileInput" accept=".json" style="display:none;">

  <script src="https://webapi.amap.com/maps?v=2.0&key=01c4ee7aa40ab2e55c191e6eee56f3d6"></script>
  <script defer src="static/js/footprintmap.js"></script>

  <script>
    const mapEl = document.getElementById('mainMap');
    const emptyTip = document.getElementById('emptyTip');

    // 接收从构建器传来的数据
    function loadFromBuilder() {
      const params = new URLSearchParams(location.search);
      const base64 = params.get('data');
      
      if (base64) {
        try {
          const jsonText = decodeURIComponent(escape(atob(base64)));
          const blob = new Blob([jsonText], { type: 'application/json' });
          const url = URL.createObjectURL(blob);
          
          mapEl.setAttribute('data-json', url);
          emptyTip.style.display = 'none';

          if (window.FootprintMap && window.FootprintMap.bootstrapMap) {
            setTimeout(() => {
              window.FootprintMap.bootstrapMap(mapEl);
            }, 150);
          }
        } catch (err) {
          console.error(err);
        }
      }
    }

    // 手动上传
    document.getElementById('loadBtn').onclick = () => document.getElementById('fileInput').click();
    document.getElementById('fileInput').onchange = e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        const blob = new Blob([reader.result], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        mapEl.setAttribute('data-json', url);
        emptyTip.style.display = 'none';
        if (window.FootprintMap && window.FootprintMap.bootstrapMap) {
          window.FootprintMap.bootstrapMap(mapEl);
        }
      };
      reader.readAsText(file);
    };

    window.onload = loadFromBuilder;
  </script>
</body>
</html>
