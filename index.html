<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>足迹数据构建器 - XiaoTen FootprintMap</title>
  <link rel="stylesheet" href="static/css/footprintmap.css" />
  <link rel="icon" href="data:;base64,=">
  <script defer src="https://tongji.xiaoten.com/random-string.js" data-website-id="310ac8bc-25e0-4f76-95fb-31797490c73a"></script>
  <style>
    /* 原有样式保持不变（这里省略了大量重复样式，实际使用时请保留你原来的 style 标签内容） */
    *, *::before, *::after { box-sizing: border-box; }
    html, body, input, textarea, select, button { -webkit-text-size-adjust:100%; -ms-text-size-adjust:100%; }
    body { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif; background:#f5f7fa; margin:0; padding:0; }
    header { padding:20px 24px; background:linear-gradient(135deg,#6366f1,#8b5cf6); color:#fff; }
    header h1 { margin:0 0 6px; font-size:22px; }
    main { display:flex; flex-wrap:wrap; gap:20px; padding:20px 24px; max-width:1400px; margin:0 auto; }
    .panel { background:#fff; border:1px solid #e2e8f0; border-radius:10px; padding:20px 24px; flex:1 1 420px; min-width:0; box-sizing:border-box; }
    /* 其他样式保持你原来的 ... */
  </style>
</head>
<body>
  <header>
    <h1>足迹数据构建器</h1>
    <p>可视化录入地点信息，生成符合 XiaoTen-FootprintMap 规范的 JSON 数据。</p>
  </header>

  <main>
    <!-- 左侧：坐标拾取 + 表单 -->
    <section class="panel" style="flex:1 1 480px;">
      <h2>🗺️ 坐标拾取</h2>
      <div style="display:flex; gap:8px; margin-bottom:8px;">
        <input type="text" id="placeSearchInput" placeholder="搜索地点以定位拾取，如：杭州西湖" style="flex:1;" />
        <button type="button" class="secondary" id="placeSearchBtn">搜索</button>
      </div>
      <div id="map" style="height:360px; border-radius:8px; overflow:hidden; border:1px solid #cbd5e1;"></div>

      <h2 style="margin-top:16px;">📝 地点录入</h2>
      <form id="locationForm" autocomplete="off">
        <!-- 你的原有表单内容保持不变 -->
        <div id="formErrors" style="display:none; margin-bottom:12px; padding:8px 10px; border:1px solid #dc2626; background:#fef2f2; color:#b91c1c; border-radius:6px; font-size:12px;"></div>
        
        <div class="group">
          <label>名称 *（必填）</label>
          <input type="text" id="name" required placeholder="如：北京" />
        </div>
        <div class="group">
          <label>描述（可选）</label>
          <textarea id="description" placeholder="简要描述该地点"></textarea>
        </div>
        <div class="group">
          <label>日期（可选，YYYY-MM-DD）</label>
          <div class="inline date-row">
            <input type="date" id="date" style="flex:1;" />
            <button type="button" class="secondary" id="clearDateBtn">清空日期</button>
          </div>
        </div>
        <div class="group">
          <label>标记颜色（可选）</label>
          <div id="markerColorPalette" class="marker-color-palette"></div>
          <input type="hidden" id="markerColor" value="" />
        </div>
        <div class="group">
          <label>分类（多选）</label>
          <div id="categoryOptions" class="tags-options"></div>
          <div style="display:flex; gap:8px; margin-top:6px;">
            <input type="text" id="newCategoryInput" placeholder="输入后回车或点击添加" style="flex:1;" />
            <button type="button" class="secondary" id="addCategoryBtn">添加</button>
          </div>
        </div>
        <div class="group">
          <label>图片 URL</label>
          <div style="display:flex; gap:8px;">
            <input type="text" id="photoInput" placeholder="https://...jpg" style="flex:1;" />
            <button type="button" class="secondary" id="addPhotoBtn">添加图片</button>
          </div>
          <div class="photos-list" id="photosList"></div>
        </div>
        <div class="inline">
          <div class="group">
            <label>关联链接 URL</label>
            <input type="text" id="url" placeholder="https://你的博客文章" />
          </div>
          <div class="group">
            <label>链接文字</label>
            <input type="text" id="urlLabel" placeholder="阅读游记" />
          </div>
        </div>

        <div class="controls">
          <button type="submit" id="submitBtn">✚ 添加地点</button>
          <button type="button" class="secondary" id="resetFormBtn">清空表单</button>
          <button type="button" class="secondary" id="cancelEditBtn" style="display:none;">取消编辑</button>
        </div>
      </form>
    </section>

    <!-- 右侧：JSON + 已添加地点 -->
    <section class="panel" style="flex:1 1 420px;">
      <div class="import-block">
        <label style="font-weight:600; font-size:12px;">导入已有 JSON 文件</label>
        <input type="file" id="importFile" accept="application/json" />
        <label style="display:flex; align-items:center; gap:6px; margin-top:6px;">
          <input type="checkbox" id="importAutoSort" checked />
          <span style="font-size:11px;">导入后自动按日期排序</span>
        </label>
      </div>

      <h2 style="margin-top:16px;">JSON代码</h2>
      <div class="controls" style="margin-bottom:12px;">
        <button type="button" id="generateBtn">下载 JSON</button>
        <button type="button" class="secondary" id="copyBtn">复制</button>
        <button type="button" id="openPreviewBtn" style="background:#10b981; border-color:#10b981;">🔗 在新页面预览</button>
      </div>
      <pre id="jsonOutput" style="min-height:420px; max-height:420px;"></pre>

      <h2 style="margin-top:20px;">📍 已添加地点</h2>
      <div class="location-list" id="locationList"></div>

      <div class="controls">
        <button type="button" class="secondary" id="clearAllBtn">清空所有</button>
        <button type="button" class="danger" id="removeLastBtn">删除最后一个</button>
      </div>
    </section>
  </main>

  <footer>
    <div>Made with ❤️ XiaoTen-FootprintMap 数据构建器 · 本地保存草稿</div>
    <div style="margin-top:8px;font-size:12px;color:#94a3b8;">
      © <a href="https://www.xiaoten.com" target="_blank">XiaoTen</a>
    </div>
  </footer>

  <script src="https://webapi.amap.com/maps?v=2.0&key=01c4ee7aa40ab2e55c191e6eee56f3d6"></script>
  <script src="static/js/theme.js"></script>
  <script src="static/js/utils.js"></script>
  <script defer src="static/js/footprintmap.js"></script>
  <script defer src="static/js/plugin-visited.js"></script>
  <script defer src="static/js/plugin-hover.js"></script>

  <script>
    // ==================== 你的原有 JavaScript 核心代码 ====================
    // （为了节省篇幅，这里只展示关键修改部分，其他逻辑保持不变）

    let locations = [];
    let editingIndex = null;
    let sortByDate = false;

    // ...（保留你原来的所有函数：renderLocations, generateJson, persistDraft 等）

    // ==================== 新增：打开独立预览页面 ====================
    function openPreviewPage() {
      generateJson(); // 确保 JSON 最新
      const jsonText = jsonOutput.textContent.trim();
      if (!jsonText || jsonText === '{}') {
        alert('请先添加至少一个地点');
        return;
      }

      const blob = new Blob([jsonText], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      
      // 打开预览页面并传递数据
      const previewUrl = `preview.html?json=${encodeURIComponent(url)}`;
      window.open(previewUrl, '_blank');
    }

    // 绑定按钮
    document.getElementById('openPreviewBtn').addEventListener('click', openPreviewPage);

    // 生成 JSON（保持原有逻辑）
    function generateJson() {
      let exportLocations = locations.map(l => ({ ...l }));
      if (sortByDate) {
        exportLocations.sort((a, b) => {
          const da = Date.parse(a.date || '');
          const db = Date.parse(b.date || '');
          if (isNaN(da)) return 1;
          if (isNaN(db)) return -1;
          return db - da;
        });
      }
      const obj = { locations: exportLocations };
      jsonOutput.textContent = JSON.stringify(obj, null, 2);
    }

    // 初始化
    document.getElementById('generateBtn').onclick = () => {
      generateJson();
      const text = jsonOutput.textContent;
      if (!text) return;
      const blob = new Blob([text], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'footprints.json';
      a.click();
    };

    // 其他原有初始化代码...
    // renderLocations(), initMarkerColorPalette(), renderCategoryOptions() 等保持不变

  </script>
</body>
</html>
